name: CI/CD – VitalSync Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================================
  # ÉTAPE 1 : Lint & Tests
  # Installation des dépendances, lint ESLint, tests Jest
  # ============================================================
  lint-and-test:
    name: "Étape 1 – Lint & Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Mise en place de Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Installation des dépendances (incluant devDependencies)
        working-directory: ./backend
        run: npm install

      - name: Exécution du linter ESLint
        working-directory: ./backend
        run: npm run lint

      - name: Exécution des tests unitaires Jest
        working-directory: ./backend
        run: npm test

  # ============================================================
  # ÉTAPE 2 : Build Docker & Push vers GHCR
  # Construction + tag SHA + push du backend et du frontend
  # ============================================================
  build-and-push:
    name: "Étape 2 – Build Docker & Push GHCR"
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Connexion au GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcul du préfixe d'image en minuscules
        run: echo "IMAGE_PREFIX=$(echo '${{ github.repository_owner }}/vitalsync' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & Push de l'image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build & Push de l'image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

  # ============================================================
  # ÉTAPE 3 : Déploiement Staging + Health Check
  # Simulation locale via docker-compose, puis vérification /health
  # ============================================================
  deploy-staging:
    name: "Étape 3 – Déploiement Staging & Health Check"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Création du fichier .env pour le staging
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "NODE_ENV=staging" >> .env

      - name: Déploiement via Docker Compose (staging)
        run: docker-compose up --build -d

      - name: Attente du démarrage des services (10 secondes)
        run: sleep 10

      - name: Health Check du back-end
        # La pipeline échoue automatiquement si le serveur ne répond pas 200
        run: |
          echo "Vérification de la santé du back-end..."
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" http://localhost:3000/health)
          echo "HTTP Status reçu : $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERREUR : Le health check a échoué (HTTP $STATUS). Arrêt de la pipeline."
            exit 1
          fi
          echo "Health check réussi !"

      - name: Arrêt des services staging
        if: always()
        run: docker-compose down
