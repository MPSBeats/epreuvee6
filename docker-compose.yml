version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vitalsync-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - vitalsync_net
    volumes:
      - vitalsync_db_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
    container_name: vitalsync-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - NODE_ENV=${NODE_ENV}
    networks:
      - vitalsync_net
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: vitalsync-frontend
    ports:
      - "80:80"
    networks:
      - vitalsync_net
    depends_on:
      - backend
    restart: always

networks:
  vitalsync_net:
    driver: bridge

volumes:
  vitalsync_db_data:
